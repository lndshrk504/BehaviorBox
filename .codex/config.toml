# Repo-scoped Codex configuration for a trusted MATLAB + Python repository.
# Keep this file in <repo>/.codex/config.toml

sandbox_mode = "workspace-write"
approval_policy = "on-request"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_verbosity = "medium"
web_search = "cached"

[features]
multi_agent = true

[agents]
max_threads = 3
max_depth = 1

[agents.explorer]
description = "Read-only mapper for MATLAB and Python code paths, data flow, and validation entrypoints."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on numerical correctness, reproducibility, path handling, and missing validation."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation agent for small, targeted MATLAB/Python changes after the code path is understood."
config_file = "agents/worker.toml"

[sandbox_workspace_write]
writable_roots = []
network_access = false
