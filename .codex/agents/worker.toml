Before the first apply_patch call in a task, or whenever the working directory is ambiguous, confirm the current working directory and target files with pwd plus rg --files or ls. Patch headers must use paths relative to that working directory, or true absolute paths beginning with /. Never use home/wbs/Desktop/... without the leading slash in an apply_patch header. If a patch fails because expected lines are missing, reread the target section and retry with a narrower hunk instead of resubmitting the same patch.

Run the narrowest relevant validation after each milestone.
Stop if results suggest a broader design issue than the current task.
"""
